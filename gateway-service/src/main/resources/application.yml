# gateway-service/src/main/resources/application.yml
server:
  port: 8080 # 1. 게이트웨이는 MSA의 대표 포트인 8080번을 사용

spring:
  application:
    name: gateway-service # 2. 서비스 이름 정의

  cloud:
    gateway:
      # 글로벌 타임아웃 설정
      httpclient:
        # 전체 라우트에 적용될 응답 타임아웃 (단위: ms)
        # 5초 안에 응답이 오지 않으면 실패 처리
        response-timeout: 5000
        # 연결 타임아웃 (다운스트림 서비스와 연결을 맺는 시간)
        connect-timeout: 1000
      # 모든 라우트에 기본으로 적용될 필터
      default-filters:
        # 커스텀 필터 이름은 'Filter' 접미사를 제외하고 카멜케이스로 작성
        - AuthenticationFilter
      # 3. 라우팅 규칙 정의 (routes는 List 형태)
      routes:
        # --- 회원 서비스 라우트 ---
        - id: member-service-route # 4. 각 라우트의 고유 ID
          # 5. 이 라우트가 최종적으로 요청을 전달할 목적지 URI
          # (주: 지금은 하드코딩. 05장에서 서비스 디스커버리를 통해 'lb://MEMBER-SERVICE'로 변경)
          uri: http://localhost:8081
          # 6. 이 라우트가 적용될 조건 (Predicates)
          predicates:
            - Path=/api/v1/members/** # 7. /api/v1/members/로 시작하는 모든 요청
          # filters 추가
          filters:
            # AddRequestHeader 필터 사용
            # Name: 필터 이름, args: 필터에 전달할 인자 (key: value)
            - name: AddRequestHeader
              args:
                name: X-Request-Source # 헤더의 key
                value: gateway-service # 헤더의 value
            # 3. (축약형) AddResponseHeader 필터도 추가해 보자.
            # "필터이름=인자1,인자2,..." 형태로도 사용 가능
            - AddResponseHeader=X-Response-Source, gateway-service

        # --- (미래) 상품 서비스 라우트 ---
        - id: product-service-route
          uri: http://localhost:8082 # (아직 존재하지 않는 서비스)
          predicates:
            - Path=/api/v1/products/**
          filters:
            - name: Retry # 상품 서비스는 재시도 정책 적용
              args:
                retries: 3 # 최대 3번까지 재시도
                statuses: # 어떤 HTTP 상태 코드일 때 재시도할 것인가
                  - BAD_GATEWAY # 502 Bad Gateway
                  - SERVICE_UNAVAILABLE # 503 Service Unavailable
                  - GATEWAY_TIMEOUT # 504 Gateway Timeout
                methods: # 어떤 HTTP 메서드에만 재시도할 것인가
                  - GET # 멱등성(Idempotent)이 보장되는 GET, HEAD, OPTIONS emd
                backoff: # 재시도 간격 설정 (Exponential Backoff)
                  firstBackoff: 100ms # 첫 시도까지 100ms 대기
                  maxBackoff: 500ms # 최대 500ms 까지 늘어남
                  factor: 2 # 대기 시간을 2배씩 증가 (100ms -> 200ms -> 400ms)
                  basedOnPreviousValue: true


        # --- (미래) 주문 서비스 라우트 ---
        - id: order-service-route
          uri: http://localhost:8083 # (아직 존재하지 않는 서비스)
          predicates:
            - Path=/api/v1/orders/**

        - id: some-slow-service-route # 예: 외부 시스템과 연동하는 느린 서비스
          uri: http://localhost:8088
          predicates:
            - Path=/api/v1/slow-service/**
          # --- 2. 특정 라우트에 대한 타임아웃 재정의 ---
          metadata:
            response-timeout: 10000 # 이 라우트는 10초까지 기다림
            connect-timeout: 2000

jwt:
  secret: 'a_very_long_and_secure_secret_key_for_ecommerce_project_that_is_at_least_256_bits_long'

# 1. 경로별 권한 설정
security:
  required-roles:
    # '/api/v1/admin/**' 경로는 ADMIN 역할이 필요
    - path: /api/v1/admin/**
      role: ADMIN
    # '/api/v1/orders/**' 경로는 USER 역할이 필요
    - path: /api/v1/orders/**
      role: USER
    # (여기에 명시되지 않은 경로는 인증만 되면 통과)
