server:
  port: 8888

spring:
  application:
    name: config-service
  cloud:
    config:
      server:
        git:
          uri: https://github.com/somefood/spring-cloud-study
          default-label: main
          search-paths: config-repo
    consul:
      host: localhost
      port: 8500
      discovery:
        enabled: true